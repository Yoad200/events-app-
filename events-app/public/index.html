<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניהול אירועים</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ─────────── Login Screen ─────────── -->
<div id="screen-login" class="screen">
  <div class="card">
    <img src="logo.png" alt="גלובל" class="logo-large">
    <h1 class="title">ניהול אירועים</h1>
    <p class="subtitle">היכנס כדי להתחיל</p>
    <div class="form-section">
      <div class="form-row">
        <input type="password" id="login-pwd" class="form-input" placeholder="סיסמה" maxlength="128">
      </div>
      <p class="error" id="login-error"></p>
    </div>
    <button class="btn-primary" id="btn-login">כניסה</button>
  </div>
</div>

<!-- ─────────── Main Dashboard ─────────── -->
<div id="screen-app" class="app" style="display:none">

  <!-- Header -->
  <div class="app-header">
    <div class="app-header-title">
      <img src="logo.png" alt="גלובל" class="logo-header">
      <h1>ניהול אירועים</h1>
    </div>
    <div class="app-header-actions">
      <button class="btn-secondary" id="btn-workers">👥 עובדים</button>
       <button class="btn-secondary" onclick="window.location.href='contracts.html'">📋 חוזים</button>
      <button class="btn-primary" id="btn-new-event">+ אירוע חדש</button>
      <button class="btn-link" id="btn-logout">יציאה</button>
    </div>
  </div>

  <!-- Events List -->
  <div class="events-container">
    <div class="events-header">
      <h2 id="events-title">האירועים שלי</h2>
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="upcoming">קרובים</button>
        <button class="filter-tab" data-filter="all">כולם</button>
        <button class="filter-tab" data-filter="past">עברו</button>
      </div>
    </div>

    <div class="events-grid" id="events-grid"></div>

    <div class="events-empty" id="events-empty" style="display:none">
      <div class="events-empty-icon">📅</div>
      <h3>אין אירועים עדיין</h3>
      <p>לחץ "אירוע חדש" כדי להתחיל</p>
    </div>
  </div>

</div>

<!-- ─────────── New Event Modal ─────────── -->
<div class="modal-backdrop" id="new-event-modal" style="display:none">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2>אירוע חדש</h2>
      <button class="modal-close" data-close="new-event-modal">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>כותרת האירוע (אופציונלי)</label>
        <input type="text" id="ev-title" class="form-input" placeholder="לדוגמה: חתונה של דניאל ויעל" maxlength="200">
      </div>

      <div class="form-row-grid">
        <div class="form-row">
          <label>תאריך</label>
          <input type="date" id="ev-date" class="form-input">
        </div>
        <div class="form-row">
          <label>תשלום לשעה (₪)</label>
          <input type="number" id="ev-rate" class="form-input" value="50" min="0" max="10000">
        </div>
      </div>

      <div class="form-row-grid">
        <div class="form-row">
          <label>שעת התחלה</label>
          <input type="time" id="ev-start" class="form-input" value="18:00">
        </div>
        <div class="form-row">
          <label>שעת סיום</label>
          <input type="time" id="ev-end" class="form-input" value="23:00">
        </div>
      </div>

      <div class="form-row">
        <label>מקום</label>
        <input type="text" id="ev-location" class="form-input" placeholder="כפר מכבי, באר שבע..." maxlength="200">
      </div>

      <div class="form-row">
        <label>הערות (אופציונלי)</label>
        <textarea id="ev-notes" class="form-input" rows="2" placeholder="לבוש חגיגי, להגיע 30 דק לפני..." maxlength="500"></textarea>
      </div>

      <h3 class="section-title">כמה עובדים צריך?</h3>

      <div class="role-grid">
        <div class="role-input">
          <label>🍽️ מלצרים</label>
          <input type="number" id="ev-waiters" class="form-input" value="0" min="0" max="50">
        </div>
        <div class="role-input">
          <label>🔨 הקמה/פירוק</label>
          <input type="number" id="ev-setup" class="form-input" value="0" min="0" max="50">
        </div>
        <div class="role-input">
          <label>🎮 תפעול אטרקציות</label>
          <input type="number" id="ev-attractions" class="form-input" value="0" min="0" max="50">
        </div>
        <div class="role-input">
          <label>🌮 דוכני מזון</label>
          <input type="number" id="ev-food" class="form-input" value="0" min="0" max="50">
        </div>
      </div>

      <p class="error" id="ev-error"></p>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" data-close="new-event-modal">ביטול</button>
      <button class="btn-primary" id="btn-save-event">צור אירוע</button>
    </div>
  </div>
</div>

<!-- ─────────── Event Created Modal (Share Link) ─────────── -->
<div class="modal-backdrop" id="share-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2>🎉 האירוע נוצר!</h2>
      <button class="modal-close" data-close="share-modal">×</button>
    </div>
    <div class="modal-body">
      <p style="text-align:center;color:#6b7280;margin-bottom:16px">
        שלח את הקישור לעובדים שלך
      </p>
      <div class="share-link-box">
        <input type="text" id="share-link" class="form-input" readonly>
        <button class="btn-copy" id="btn-copy-link">📋 העתק</button>
      </div>
      <p id="copy-confirm" style="text-align:center;color:#10b981;height:20px;margin-top:8px;font-size:13px"></p>
      <div class="share-helper">
        <p>💡 העתק את הקישור והדבק בקבוצת ה-WhatsApp שלך</p>
      </div>
    </div>
   <div class="modal-footer">
      <button class="btn-whatsapp" id="btn-send-whatsapp">📱 שלח לקבוצה ב-WhatsApp</button>
      <button class="btn-primary" data-close="share-modal">סגור</button>
    </div>
  </div>
</div>

<!-- ─────────── Event Details Modal ─────────── -->
<div class="modal-backdrop" id="event-details-modal" style="display:none">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 id="ed-title">פרטי אירוע</h2>
      <button class="modal-close" data-close="event-details-modal">×</button>
    </div>
    <div class="modal-body">
      <div class="event-info-card" id="ed-info"></div>

      <div class="signups-tabs">
        <button class="signup-tab active" data-status="pending">⏳ ממתינים <span id="count-pending">0</span></button>
        <button class="signup-tab" data-status="approved">✓ אושרו <span id="count-approved">0</span></button>
        <button class="signup-tab" data-status="rejected">✗ נדחו <span id="count-rejected">0</span></button>
      </div>

      <div class="signups-list" id="signups-list"></div>

      <div class="signups-empty" id="signups-empty">
        <p>אין רישומים</p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="btn-delete-event">🗑 מחק אירוע</button>
      <button class="btn-warning" id="btn-toggle-status">🔒 סגור הרשמה</button>
      <button class="btn-secondary" id="btn-share-event">📤 שתף קישור</button>
      <button class="btn-primary" data-close="event-details-modal">סגור</button>
    </div>
  </div>
</div>

<!-- ─────────── Workers Modal ─────────── -->
<div class="modal-backdrop" id="workers-modal" style="display:none">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2>👥 רשימת עובדים</h2>
      <button class="modal-close" data-close="workers-modal">×</button>
    </div>
    <div class="modal-body">
      <div class="workers-list" id="workers-list"></div>
      <div class="workers-empty" id="workers-empty" style="display:none">
        <p>אין עובדים עדיין</p>
      </div>
    </div>
  </div>
</div>

<!-- ─────────── Confirm Modal ─────────── -->
<div class="modal-backdrop" id="confirm-modal" style="display:none">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 id="confirm-title">אישור</h2>
      <button class="modal-close" data-close="confirm-modal">×</button>
    </div>
    <div class="modal-body">
      <p id="confirm-message" style="text-align:center;color:#4b5563"></p>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" data-close="confirm-modal">ביטול</button>
      <button class="btn-primary" id="btn-confirm-yes">אישור</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="app.js"></script>

</body>
</html>
